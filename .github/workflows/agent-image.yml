# Build + publish the Qentra agent image to GHCR on every push to main / tag.
# Copy to `.github/workflows/agent-image.yml` in the public repo.
# After the first run, make the GHCR package PUBLIC:
#   GitHub → Packages → qentra-agent → Package settings → Change visibility → Public.
name: Build agent image
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: ["agent/**", ".github/workflows/agent-image.yml"]
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/qentra-on-call/qentra-agent
          tags: |
            type=raw,value=0.1.0
            type=raw,value=latest
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
